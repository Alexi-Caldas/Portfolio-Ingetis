<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Positionner le lien "Retour" en haut à droite */
        a {
            position: absolute;
            top: 20px;  /* Distance du haut de la page */
            right: 20px; /* Distance de la droite de la page */
            background-color: #007aff; /* Couleur du fond */
            color: white; /* Couleur du texte */
            padding: 10px 20px; /* Espacement autour du texte */
            border-radius: 5px; /* Coins arrondis */
            text-decoration: none; /* Enlever le soulignement */
            font-size: 1rem; /* Taille du texte */
        }

        /* Effet au survol */
        a:hover {
            background-color: #0056b3; /* Changer la couleur au survol */
        }
    </style>
</head>
<body bgcolor="pink">
    <h1>Page principale</h1>
    <!-- Lien Retour en haut à droite -->
