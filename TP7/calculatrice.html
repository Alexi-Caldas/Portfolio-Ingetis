<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculatrice</title>
    <link rel="stylesheet" href="calculatrice.css">
</head>
<body>
    <!-- Bouton Retour en bas de la page -->
    <div class="back-button">
        <a href="../index.html" class="btn-back">Retour</a>
    </div>

    <!-- Section Calculatrice -->
    <div class="calculator">
        <!-- Champs de saisie -->
        <input type="number" id="num1" placeholder="Numéro 1" />
        <input type="number" id="num2" placeholder="Numéro 2" />

        <!-- Opérations -->
        <div class="operations">
            <button onclick="calculate('+')">+</button>
            <button onclick="calculate('-')">-</button>
            <button onclick="calculate('*')">*</button>
            <button onclick="calculate('/')">/</button>
        </div>

        <!-- Boutons supplémentaires -->
        <div class="extra-buttons">
            <button onclick="checkParity()">Parité</button>
            <button onclick="swapNumbers()">Permuter</button>
        </div>

        <div>
            <h3>Résultat: <span id="result">0</span></h3>
        </div>
    </div>

    <script src="calculatrice.js"></script>
</body>
</html>
