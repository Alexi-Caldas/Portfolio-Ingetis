<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculatrice de Facture</title>
    <link rel="stylesheet" href="facture.css">
</head>
<body>
    <header>
        <h1>Calculatrice de Facture</h1>
    </header>

    <main class="order-calculator">
        <div class="article">
            <label for="price1">Prix Article 1 (€) :</label>
            <input type="number" id="price1" placeholder="Prix" />
            <label for="quantity1">Quantité Article 1 :</label>
            <input type="number" id="quantity1" placeholder="Quantité" />
        </div>

        <div class="article">
            <label for="price2">Prix Article 2 (€) :</label>
            <input type="number" id="price2" placeholder="Prix" />
            <label for="quantity2">Quantité Article 2 :</label>
            <input type="number" id="quantity2" placeholder="Quantité" />
        </div>

        <div class="article">
            <label for="price3">Prix Article 3 (€) :</label>
            <input type="number" id="price3" placeholder="Prix" />
            <label for="quantity3">Quantité Article 3 :</label>
            <input type="number" id="quantity3" placeholder="Quantité" />
        </div>

        <div class="calculate">
            <button onclick="calculateTotal()">Calculer les Résultats</button>
        </div>

        <div class="result">
            <h3>Total de la Facture : <span id="total">0 €</span></h3>
        </div>
    </main>

    <footer>
        <a href="../index.html" class="btn-back">Retour</a>
    </footer>

    <script src="facture.js"></script>
</body>
</html>
